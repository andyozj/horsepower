# Render Blueprint — Horsepower (free tier to start).
# In Render: New + → "Blueprint" → connect this repo → it reads this file.
# WebSockets + persistent Node are supported on free; the only free-tier limits are
# idle-sleep (~15 min) and NO persistent disk (workshop data resets on restart — see DEPLOY.md).
services:
  # ── The retrofit-trap interactive deck (FORGE offsite) — a SEPARATE standalone app ──
  # Apply this in Render: Blueprint → "Apply" to create the service, then set ANTHROPIC_API_KEY
  # + HOSTKEY in its Environment. Presenter link: https://<name>.onrender.com/present?host=<HOSTKEY>
  - type: web
    name: horsepower-trap
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node trap-server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOSTKEY
        sync: false                         # SET → stable presenter link (else it rotates each restart)
      # AI assumption-judge. COPY THESE FROM THE `horsepower` SERVICE so it hits the same
      # gateway (e.g. the Heineken GenAI proxy). With ONLY the key set, a gateway key 401s
      # against api.anthropic.com and the bot silently falls back to accept-everything.
      - key: ANTHROPIC_API_KEY
        sync: false                         # the gateway/Anthropic key
      - key: ANTHROPIC_BASE_URL
        sync: false                         # FULL url, e.g. https://genai.heineken.com/models/anthropic/v1/messages
      - key: ANTHROPIC_AUTH_HEADER
        sync: false                         # the proxy uses 'api-key' (native Anthropic uses 'x-api-key')
      - key: ANTHROPIC_MODEL
        sync: false                         # same model as the main app (default claude-opus-4-8)

  - type: web
    name: horsepower
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev   # skips Playwright (devDependency) → faster, smaller build
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TRUSTED_PROXY_HOPS
        value: "1"                          # Render runs behind one proxy → real client IPs
      - key: MINT_GLOBAL_MAX
        value: "300"
      - key: COACH_IP_MAX
        value: "600"                        # a whole workshop is behind ONE office NAT (shared IP); 40/hr starved the room. Per-ROOM bucket (10/min) is the real throttle.
      - key: COACH_GLOBAL_MAX
        value: "2000"
      - key: ALLOWED_ORIGINS
        sync: false                         # SET AFTER 1st deploy → your https://<name>.onrender.com URL
      - key: ANTHROPIC_API_KEY
        sync: false                         # OPTIONAL — leave unset to run the free rule-based Coach
      - key: DATABASE_URL
        sync: false                         # OPTIONAL but RECOMMENDED — a managed Postgres (e.g. Azure
                                            # Database for PostgreSQL) connection string. Set it and rooms
                                            # become DURABLE across restarts/redeploys (free-tier disk is
                                            # ephemeral). Unset → falls back to the local file store.
                                            # TLS is ON by default (Azure requires it); set PG_NO_SSL=1
                                            # only for a local no-TLS Postgres. See docs/DEPLOY.md.
# Durability: set DATABASE_URL above (managed Postgres) — no disk block needed. The app stores one JSONB
# row per workshop and reloads them on boot. This is SINGLE-INSTANCE durability; multi-instance scale
# needs cross-instance pub/sub (a separate phase — see CLAUDE.md / DEPLOY.md scaling notes).
