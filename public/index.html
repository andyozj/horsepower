.racecard .rc-foot{font-family:Inter,sans-serif; font-size:12px; font-weight:500; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-strong); margin-top:12px}
.racecard .rc-crest{display:block; width:140px; height:auto; margin:-4px auto 8px; opacity:.92}
@media (prefers-reduced-motion: reduce){ .racecard{animation:none !important; opacity:1 !important} }

/* people 'to land' tray (mirror of the orphan tray) */
.landtray{position:absolute; right:12px; top:62px; width:238px; max-height:64%; overflow:auto; background:var(--card); border:1.5px solid var(--ink); border-radius:var(--r-paper); padding:11px; z-index:var(--z-panel); box-shadow:var(--shadow-float)}
.landtray h3{font-size:15px; font-variation-settings:"opsz" 24; display:flex; align-items:center; gap:7px; margin-bottom:8px}
.landtray h3 .glyph{width:16px; height:16px; color:var(--lock)}
.landtray .ppl-note{font-family:Caveat,cursive; font-size:17px; font-weight:600; color:var(--muted-strong); margin:-4px 0 6px}
.landtray .ppl-how{font-size:13px; line-height:1.5; color:var(--muted-strong); margin:0 0 9px; padding-bottom:8px; border-bottom:1.5px dashed var(--line-soft)}
.landtray .ppl-how b{color:var(--ink)}
.landperson{border:1.4px solid var(--line); border-radius:var(--r-scrap); padding:8px 10px; margin-bottom:8px; background:var(--paper); font-size:13px; transition:opacity .3s}
.landperson .pr{display:flex; align-items:center; gap:6px; font-weight:600; font-size:13.5px}
.landperson .why{color:var(--muted-strong); font-size:13px; margin-top:2px}
.landperson .ctrls{display:flex; flex-wrap:wrap; gap:4px; margin-top:7px} /* "removed" must never clip to "remove" — it's a gate verb */
.landperson .lb{border:1.2px solid var(--line); background:var(--card); border-radius:8px; padding:6px 10px; font-size:13px; font-weight:500}
.landperson .lb.stays.on{background:var(--wash-blue); border-color:var(--ink)}
.landperson .lb.transforms.on{background:var(--ok-wash); border-color:var(--ok); color:var(--ok)}
.landperson .lb.removed.on{background:var(--removed-wash); border-color:var(--muted); color:var(--muted); text-decoration:line-through}
.landperson textarea{font-size:12px; min-height:30px; margin-top:5px}
.landperson.landed{opacity:.62}
/* Slice C: the inline persona redesign-challenge on each landed person */
.perschal{margin-top:7px; border-top:1.4px dashed var(--line-soft); padding-top:7px}
.perschal .reqchip{display:inline-block; font-size:11.5px; font-weight:600; padding:2px 8px; border-radius:999px; background:var(--removed-wash); border:1.2px solid var(--warn,#c9881f); color:var(--warn,#9a6a14)}
.perschal .reqchip.ok{background:var(--ok-wash); border-color:var(--ok); color:var(--ok)}
.chalreply{font-size:12.5px; line-height:1.45; color:var(--ink); background:var(--card); border-left:2.5px solid var(--pop,#e23b3b); padding:5px 8px; border-radius:0 7px 7px 0; margin:6px 0}
.chalreply.deg{border-left-color:var(--muted); color:var(--muted-strong); font-style:italic}
.btn.xs{font-size:11.5px; padding:3px 8px}
/* Slice C: live shape-meter (retrofit detector) on the people tray */
.shapemeter{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; margin:-2px 0 8px; padding:5px 9px; border-radius:8px; border:1.4px solid var(--line)}
.shapemeter .bnd{font-family:Fraunces,serif; letter-spacing:.02em}
.shapemeter.REDESIGNED{background:var(--ok-wash); border-color:var(--ok); color:var(--ok)}
.shapemeter.PARTIAL{background:var(--wash-outcome); border-color:var(--thin); color:var(--thin-text,#7a4f07)}
.shapemeter.retrofit{background:var(--removed-wash); border-color:var(--pop,#e23b3b); color:var(--pop,#e23b3b)}
/* Slice C: the constraint routing panel — real or habit? */
.conpanel{position:absolute; left:12px; top:96px; width:306px; max-width:46vw; z-index:var(--z-panel); background:var(--card); border:1.5px solid var(--ink); border-radius:var(--r-paper); box-shadow:var(--shadow-float)}
.conpanel>summary{list-style:none; cursor:pointer; padding:10px 13px; display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600}
.conpanel>summary .glyph{width:15px; height:15px; color:var(--lock); flex:none}
.conpanel>summary .cnt{margin-left:auto; background:var(--wash-blue); border:1.3px solid var(--ink); border-radius:999px; padding:1px 9px; font-size:12px; font-variant-numeric:tabular-nums}
.conpanel .body{max-height:42vh; overflow:auto; padding:0 12px 11px}
.conrow{border-top:1.4px dashed var(--line-soft); padding:8px 0}
.conrow .ct{font-size:13px; font-weight:600; line-height:1.35}
.csrc{display:flex; flex-wrap:wrap; gap:4px; margin:6px 0 0}
.csrc .sbtn{font-size:11.5px; padding:3px 8px; border:1.2px solid var(--line); background:var(--paper); border-radius:7px; font-weight:500; cursor:pointer}
.csrc .sbtn.on{background:var(--ink); color:var(--card); border-color:var(--ink)}
.cverdict{font-size:11.5px; font-weight:700; margin-top:6px; letter-spacing:.01em}
.cverdict.real{color:var(--ok)}
.cverdict.assumed{color:var(--pop,#e23b3b)}
.conchal{margin-top:5px}
/* Slice B: push-to-talk voice button states */
.ivmic .glyph{width:15px; height:15px; vertical-align:-3px; margin-right:3px}
.ivmic.recording{background:var(--removed-wash); border-color:var(--pop,#e23b3b); color:var(--pop,#e23b3b)}
.ivmic.recording::before{content:''; display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--pop,#e23b3b); margin-right:6px; vertical-align:1px; animation:micpulse 1s ease-in-out infinite}
.ivmic.working{opacity:.65}
@keyframes micpulse{0%,100%{opacity:1} 50%{opacity:.25}}
@media (prefers-reduced-motion:reduce){.ivmic.recording::before{animation:none}}
/* Slice B Mode 2 — the voice-first stage: an immersive, confident Coach orb (Mobbin voice-mode pattern).
   Layered glow + concentric ripple rings; explicit idle/listening/thinking/speaking states; GPU-only. */
.voicestage{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:14px 20px 26px; text-align:center; flex:1; min-height:0; position:relative}
.voicestage .vshead{max-width:460px; margin-bottom:2px}
.voicestage .vshead b{font-family:Fraunces,serif; font-size:23px; font-variation-settings:"opsz" 40; display:block; letter-spacing:-.01em}
.voicestage .vshead .meta{font-size:14px; margin-top:4px; line-height:1.5}
.orbwrap{position:relative; width:min(330px,76vw); height:min(330px,76vw); display:grid; place-items:center; margin:4px 0}
.voiceorb{position:absolute; inset:0; width:100%; height:100%; border:none; background:transparent; padding:0; cursor:pointer; border-radius:50%; display:grid; place-items:center; -webkit-tap-highlight-color:transparent}
.orbhalo{position:absolute; inset:4%; border-radius:50%; z-index:0; background:radial-gradient(circle at 50% 44%, color-mix(in srgb,var(--gold) 32%, transparent) 0%, color-mix(in srgb,var(--gold) 10%, transparent) 42%, transparent 64%); animation:halobreathe 4s ease-in-out infinite; will-change:transform,opacity}
.orbring{position:absolute; inset:24%; border-radius:50%; border:1.6px solid color-mix(in srgb,var(--ink) 14%, transparent); z-index:1; opacity:0; will-change:transform,opacity}
.orbface{position:relative; z-index:3; width:48%; height:48%; border-radius:50%; overflow:hidden; display:grid; place-items:center; background:var(--card); box-shadow:0 12px 36px -10px rgba(33,49,79,.4), inset 0 0 0 3px var(--card); transition:transform .4s var(--ease-pop)}
.orbface img,.orbface svg{width:100%; height:100%; object-fit:cover}
.orbmic{position:absolute; z-index:4; bottom:29%; right:29%; width:40px; height:40px; border-radius:50%; background:var(--ink); color:var(--card); display:grid; place-items:center; box-shadow:var(--shadow-float); transition:background .2s ease, transform .2s var(--ease-pop)}
.orbmic .glyph{width:18px; height:18px}
.voiceorb.idle:hover .orbface{transform:scale(1.05)}
.voiceorb.idle:active .orbface{transform:scale(.97)}
.voiceorb.connecting{opacity:.7}
/* while live, the mic badge becomes a "stop" square — tap the orb to end the conversation */
.voiceorb:not(.idle):not(.connecting) .orbmic .glyph{display:none}
.voiceorb:not(.idle):not(.connecting) .orbmic::after{content:''; width:12px; height:12px; border-radius:3px; background:var(--card)}
.voiceorb.listening .orbhalo{background:radial-gradient(circle at 50% 44%, color-mix(in srgb,var(--pop,#e23b3b) 36%, transparent) 0%, color-mix(in srgb,var(--pop,#e23b3b) 12%, transparent) 42%, transparent 62%); animation:halobreathe 1.4s ease-in-out infinite}
.voiceorb.listening .orbmic{background:var(--pop,#e23b3b); transform:scale(1.1)}
.voiceorb.listening .orbring{opacity:1; animation:ringout 1.6s ease-out infinite}
.voiceorb.listening .orbring.r2{animation-delay:.55s}
.voiceorb.thinking .orbface{animation:facebob 1.1s ease-in-out infinite}
.voiceorb.speaking .orbhalo{background:radial-gradient(circle at 50% 44%, color-mix(in srgb,var(--moment-blue,#3b6fe2) 34%, transparent) 0%, color-mix(in srgb,var(--moment-blue,#3b6fe2) 11%, transparent) 42%, transparent 62%); animation:halobreathe 1.9s ease-in-out infinite}
.voiceorb.speaking .orbface{animation:facebob 1.7s ease-in-out infinite}
.voiceorb.speaking .orbring{opacity:1; animation:ringout 2s ease-out infinite}
@keyframes halobreathe{0%,100%{transform:scale(.95); opacity:.78} 50%{transform:scale(1.08); opacity:1}}
@keyframes ringout{0%{transform:scale(.7); opacity:.55} 100%{transform:scale(1.3); opacity:0}}
@keyframes facebob{0%,100%{transform:scale(1)} 50%{transform:scale(1.05)}}
.voicestatus{font-family:Fraunces,serif; font-size:21px; font-variation-settings:"opsz" 32; color:var(--ink); min-height:26px}
.voicecaption{max-width:540px; min-height:22px; font-size:14.5px; line-height:1.55; color:var(--muted-strong)}
.voicecaption .vcap-you{font-family:Caveat,cursive; font-size:19px; color:var(--muted); margin-bottom:4px}
.voicecaption .vcap-coach{color:var(--ink)}
.vstype{margin-top:6px; display:inline-flex; align-items:center; gap:7px; border-radius:999px; padding:9px 17px; border:1.5px solid var(--line); background:var(--card); font-weight:600; font-size:13.5px; color:var(--ink); box-shadow:var(--shadow-rest); transition:border-color var(--t-fast) ease, box-shadow var(--t-fast) ease, transform var(--t-fast) ease}
.vstype:hover{border-color:var(--ink); box-shadow:var(--shadow-hover); transform:translateY(-1px)}
.vstype .glyph{width:16px; height:16px}
.typecap{margin:0 auto 10px; text-align:center; max-width:520px}
@media (prefers-reduced-motion:reduce){ .orbhalo,.orbface,.orbring,.orbmic{animation:none !important} }
@media (max-width:560px){ .voicestage .vshead b{font-size:20px} .voicestatus{font-size:18px} }
/* full-bleed immersive layout: the stage fills the work area and centers both axes, with an ambient glow */
.work.interviewing.voicefull{justify-content:center; align-items:center; padding:0; overflow:hidden; position:relative}
.voicefull::before{content:''; position:absolute; inset:0; pointer-events:none; z-index:0; background:radial-gradient(56% 46% at 50% 42%, color-mix(in srgb,var(--gold) 13%, transparent) 0%, transparent 70%)}
.voicefull .voicestage{width:100%; max-width:none; height:100%; justify-content:center}
.voicefull .voicestage>*{position:relative; z-index:1}
.voicebar{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; justify-content:center}
.vbtn{display:inline-flex; align-items:center; gap:7px; border-radius:999px; padding:10px 18px; border:1.5px solid var(--line); background:var(--card); font-weight:600; font-size:13.5px; color:var(--ink); box-shadow:var(--shadow-rest); cursor:pointer; transition:border-color var(--t-fast) ease, box-shadow var(--t-fast) ease, transform var(--t-fast) ease}
.vbtn:hover{border-color:var(--ink); box-shadow:var(--shadow-hover); transform:translateY(-1px)}
.vbtn .glyph{width:16px; height:16px}
.landpill{position:absolute; left:12px; bottom:12px; z-index:var(--z-panel); display:flex; align-items:center; gap:7px; background:var(--ink); color:var(--card); font-size:14px; font-weight:600; padding:7px 15px; border-radius:999px; font-variant-numeric:tabular-nums; box-shadow:var(--shadow-lift)}
.landpill .glyph{width:15px; height:15px}
.landpill.done{background:var(--ok)}
/* the always-visible assumptions ledger — a floating ledger card, bottom-centre */
.assumefloat{position:absolute; left:50%; transform:translateX(-50%); bottom:12px; width:348px; max-width:64%; z-index:var(--z-panel); background:var(--card); border:1.5px solid var(--ink); border-radius:var(--r-paper); box-shadow:var(--shadow-float)}
.assumefloat summary{list-style:none; cursor:pointer; padding:10px 14px; display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600}
.assumefloat summary .glyph{width:16px; height:16px; color:var(--thin); flex:none}
.assumefloat summary .cnt{background:var(--wash-blue); border:1.3px solid var(--ink); border-radius:999px; min-width:21px; height:21px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-variant-numeric:tabular-nums}
.assumefloat summary .hint{font-family:Caveat,cursive; font-size:16px; font-weight:400; color:var(--muted); margin-left:auto}
.assumefloat .body{max-height:170px; overflow:auto; padding:0 13px 11px}

/* ---------- MOTION (playful & characterful; reduced-motion safe) ---------- */
@keyframes riseSettle{0%{opacity:0; transform:translateY(16px)}70%{transform:translateY(-2px)}100%{opacity:1; transform:translateY(0)}}
@keyframes phaseIn{0%{opacity:0; transform:translateY(12px)}100%{opacity:1; transform:translateY(0)}}
.phasein{animation:phaseIn .28s var(--ease-settle) both}
@keyframes sketchIn{to{stroke-dashoffset:0}}
@keyframes canterIn{0%{opacity:0; transform:translateX(-24px) rotate(-6deg)}60%{transform:translateX(3px) rotate(2deg)}100%{opacity:1; transform:translateX(0) rotate(0)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
@keyframes vignetteIn{0%{opacity:0; transform:translateY(8px) scale(.98)}100%{opacity:1; transform:translateY(0) scale(1)}}
@keyframes fragFly{0%{opacity:0; transform:translate(var(--fx,-30px),var(--fy,10px)) rotate(-8deg)}100%{opacity:1; transform:translate(0,0) rotate(0)}}
.anim-rise{animation:riseSettle var(--t-enter) var(--ease-settle) both}
.brandmark-draw path,.brandmark-draw circle{stroke-dasharray:90; stroke-dashoffset:90; animation:sketchIn .9s ease forwards}
.av.canter,.canter{animation:canterIn .5s cubic-bezier(.2,.9,.3,1.3) both}
.vignette{background:var(--card); border:1.5px solid var(--ink); border-radius:16px 13px 17px 12px; padding:20px 22px; max-width:380px; width:100%; box-shadow:3px 4px 0 rgba(33,49,79,.07); animation:vignetteIn .45s ease both}
.vignette .vh{font-family:Caveat,cursive; font-size:21px; color:var(--red-pen); display:flex; align-items:center; gap:8px}
.vignette .vstage{height:108px; position:relative; margin:12px 0 4px; border:1.4px dashed var(--line-soft); border-radius:11px; overflow:hidden; background:var(--paper)}
.vignette .vcap{font-size:13px; color:var(--muted)}
/* brain-dump scraps: handwriting quotes on torn paper */
.frag{position:absolute; background:var(--pop); border:1.3px dashed var(--line); border-radius:10px; padding:3px 10px;
  font-family:Caveat,cursive; font-size:18px; color:var(--muted-strong); transform:rotate(-1.6deg); animation:fragFly .6s ease both}
.vblock{position:absolute; border:1.5px solid var(--ink); border-radius:9px; padding:4px 9px; font-size:12px; font-weight:500; animation:riseSettle var(--t-enter) var(--ease-settle) both}
.vblock.coachchip{background:var(--pop); border-color:var(--red-pen); font-size:13px; padding:6px 11px; border-bottom-left-radius:3px}
.vstage .hnode{font-size:13px; padding:7px 11px; box-shadow:var(--shadow-float)}
.vstage .hann{font-size:18px}
.vstage .posterink path{stroke:rgba(33,49,79,.55)}
.vdots{display:inline-flex; gap:3px}
.vdots i{width:6px; height:6px; border-radius:50%; background:var(--muted); animation:breathe 1.2s ease-in-out infinite}
.vdots i:nth-child(2){animation-delay:.2s}.vdots i:nth-child(3){animation-delay:.4s}
.breathe{animation:breathe 3.4s ease-in-out 6} /* finite (6×, ~20s) — perpetual breathing on the collapsed Coach button jittered click-stability (the iter1/iter2 lesson); re-applied on each render while unread */
@media (prefers-reduced-motion: reduce){
  .anim-rise,.av.canter,.canter,.vignette,.vblock,.frag,.breathe,.led,.phasein,.toast,.authordot{animation:none !important}
  .brandmark-draw path,.brandmark-draw circle{stroke-dashoffset:0 !important; animation:none !important}
}

@media (max-width:860px){
  .rail:not(.collapsed){width:100% !important; position:absolute; inset:auto 0 0 0; height:50%; z-index:var(--z-panel); border-top:1.5px solid var(--ink); border-left:none}
  .work{flex-direction:column}
  .beforeafter{grid-template-columns:1fr}
}
/* ---------- phones: the canvas becomes thumb-driven ---------- */
@media (max-width:760px){
  /* palette: a fixed bottom bar, one scrollable row, 48px targets */
  .toolbar{position:fixed; left:0; right:0; bottom:0; top:auto; z-index:var(--z-panel); flex-wrap:nowrap; overflow-x:auto;
    border-top:1.5px solid var(--ink); border-bottom:none; padding:6px 8px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .toolbar::-webkit-scrollbar{display:none}
  .tool{min-height:48px; min-width:48px; flex:none}
  .canvaspane{padding-bottom:122px}
  /* distinct bottom lanes: palette 0 · gatebar 62 · pills 126 · coach/zoom 186 */
  .gatebar{position:fixed; left:0; right:0; bottom:62px; z-index:var(--z-panel); background:var(--card); border-top:1.5px dashed var(--line-soft); padding:6px 8px}
  .toolbar{-webkit-mask-image:linear-gradient(90deg,#000 88%,transparent); mask-image:linear-gradient(90deg,#000 88%,transparent)}
  .handle,.bendhandle{width:18px; height:18px}
  .viewctl{bottom:186px}
  .viewctl button{width:40px; height:40px; font-size:18px}
  /* A2c phone dock: collapsed = a fixed Coach pill above the lanes; open = a bottom sheet over them */
  .coachdock.phonepill{position:fixed; left:auto; right:12px; bottom:236px; z-index:34; background:none; border:none; flex-direction:row}
  .coachdock.phonepill .docktoggle{width:52px; height:52px; border-radius:50%; box-shadow:var(--shadow-float); border:1.5px solid var(--ink)}
  .coachdock.phonesheet{position:fixed; left:0; right:0; bottom:0; top:auto; z-index:40; max-height:72vh; border-top:1.5px solid var(--ink); box-shadow:0 -4px 16px rgba(33,49,79,.18)}
  .coachdock.phonesheet .dockmsgs{max-height:42vh}
  .goalnote{max-width:94%; font-size:12px}
  /* floating trays: collapsed pills in a row above the palette */
  .traysheet{position:fixed; bottom:126px; max-height:none; width:auto; z-index:var(--z-panel); padding:0; overflow:visible}
  .traysheet>summary{list-style:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; background:var(--card);
    border:1.4px solid var(--ink); border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; box-shadow:0 2px 0 rgba(33,49,79,.12)}
  .traysheet>summary .glyph{width:14px; height:14px}
  .traysheet>*:not(summary){display:none}
  .traysheet[open]{background:var(--card); border:1.5px solid var(--ink); border-radius:var(--r-paper); padding:10px;
    left:8px !important; right:8px !important; width:auto; max-height:46vh; overflow:auto}
  .traysheet[open]>*:not(summary){display:block}
  .traysheet[open]>summary{border:none; box-shadow:none; padding:0 0 6px; background:transparent}
  .orphantray.traysheet{left:8px; right:auto; top:auto}
  .landtray.traysheet{right:8px; left:auto; top:auto}
  .landtray.traysheet h3,.orphantray.traysheet h3{margin-top:2px}
  .assumefloat{bottom:126px; max-width:44%}
  /* when one bottom sheet is open, the other band's pill yields (no typing half-blind) */
  .canvaspane:has(.landtray.traysheet[open]) .assumefloat:not([open]){display:none}
  .canvaspane:has(.assumefloat[open]) .landtray.traysheet:not([open])>summary{display:none}
  .canvaspane:has(.landtray.traysheet[open]) .orphantray.traysheet:not([open])>summary{display:none}
  .landpill{bottom:auto; top:8px; left:auto; right:8px}
  .railtoggle.peek{position:fixed; right:12px; bottom:186px; left:auto; top:auto}
  .railpeekpill{display:none}
  .inspector{width:200px}
  .share .btn,.reckonstage .btn{min-height:44px}
}

<script>
//==================================================================
// Horsepower client — single-file vanilla JS
//==================================================================
const $ = (s, r=document) => r.querySelector(s);
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else if (k === 'dataset') Object.assign(n.dataset, attrs[k]);
    else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach(c => { if(c==null) return; n.append(c instanceof Node ? c : document.createTextNode(c)); });
  return n;
};
const glyph = (id, cls='glyph') => `<svg class="${cls}" aria-hidden="true"><use href="#${id}"/></svg>`;
// B3: role-based main landmark + one sr-only heading per view (roles, not retagging — zero layout fallout)
function asMain(node, title){ node.setAttribute('role','main'); node.prepend(el('h1',{class:'sr-only'}, title)); return node; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg, warn){ const t = el('div',{class:'toast'+(warn?' warn':''), role: warn?'alert':null},msg); $('#toasts').append(t);
  setTimeout(()=>{ if(REDUCED){ t.remove(); return; } t.classList.add('out'); setTimeout(()=>t.remove(),240); }, 3360); }
// B1/§2.7: SR-only announcer (canvas outcomes, phase changes). Polite, outside #app so render() never destroys it.
let _annT=null;
function announce(msg){ if(!msg) return; const n=$('#sr-status'); if(!n) return;
  clearTimeout(_annT); n.textContent='';                       // clear-then-set re-fires identical messages
  _annT=setTimeout(()=>{ n.textContent=msg; },30); }
// styled confirm — replaces window.confirm so critical moments stay in the design system
function confirmModal(msg, opts={}){
  // B6: native <dialog> — real focus trap + top-layer inertness + auto focus-restore on close.
  // API/testids byte-compatible with the old scrim version (page.on('dialog') is inert for <dialog> elements).
  return new Promise(res=>{
    const dlg=el('dialog',{class:'modaldlg', 'aria-label':opts.title||'Confirm'});
    const done=v=>{ try{dlg.close();}catch(e){} dlg.remove(); res(v); };
    const card=el('div',{class:'modalcard'});      // all chrome on the inner card so card-padding clicks can't dismiss
    card.append(el('h3',{}, opts.title||'Hold your horses'));
    card.append(el('p',{class:'meta', style:'margin:8px 0 0; font-size:14px; line-height:1.5'}, msg));
    const row=el('div',{class:'row', style:'margin-top:16px; justify-content:flex-end'});
    row.append(el('button',{class:'btn ghost sm', 'data-testid':'modal-cancel', onclick:()=>done(false)}, opts.cancelText||'Cancel'));
    row.append(el('button',{class:'btn sm '+(opts.danger?'danger':'primary'), 'data-testid':'modal-confirm', onclick:()=>done(true)}, opts.confirmText||'Yes, go'));
    card.append(row); dlg.append(card);
    dlg.addEventListener('cancel', e=>{ e.preventDefault(); done(false); });          // Escape (close ourselves so the promise resolves)
    dlg.addEventListener('click', e=>{ if(e.target===dlg) done(false); });            // genuine ::backdrop click only (paddingless dialog)
    document.body.append(dlg); dlg.showModal();
    setTimeout(()=>row.lastChild.focus(),30);
  });
}

const PALETTE = {
  persona:{glyph:'g-persona', color:'#7c3aed', label:'Persona', def:'who owns this'},
  trigger:{glyph:'g-trigger', color:'#2e7d52', label:'Trigger', def:'what starts it'},
  input:{glyph:null, color:'#66708a', label:'Input', def:'what it consumes'},
  phase:{glyph:null, color:'#b8860b', label:'Phase', def:'a stage'},
  moment:{glyph:null, color:'#9fb8ff', label:'Moment', def:'a moment that matters'},
  intent:{glyph:'g-flag', color:'#b8860b', label:'Intent', def:'the WHY — a decision'},
  outcome:{glyph:'g-check', color:'#ffd24a', label:'Outcome', def:'the change in the world'},
  agent:{glyph:'g-bolt', color:'#2b3a55', label:'Agent', def:'AI acts'},
  text:{glyph:null, color:'#21314f', label:'Text', def:'annotation'}
};

// faint landing/poster watermark: hand-drawn canter image, degrades to the #g-horse glyph
function bigmarkFallback(img){ img.outerHTML = '<svg style="width:100%;height:100%" aria-hidden="true"><use href="#g-horse"/></svg>'; }

// ---------- the Coach: ONE character, everywhere ----------
// red cap + whistle-red ring; same face in the lobby intro, the rail header,
// every chat bubble, and the collapsed-rail button — so "the Coach" is a WHO
// procedural fallback face (used if the illustration PNG is missing/offline)
function coachAvatarSvg(size=28){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" aria-hidden="true" style="flex:none">
    <circle cx="12" cy="12" r="11.1" fill="var(--pop)" stroke="var(--red-pen)" stroke-width="1.5"/>
    <g transform="translate(1.4 2.2) scale(.9)" fill="none" stroke="var(--ink)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5.2 13.4 L6.8 13 C8.2 12.7 9.4 13.2 10.2 14.3 C10.8 15.6 10.7 17.6 10.6 19.6 L18 19.6 C18.7 15.4 18.3 9.6 15.4 5.6 L14.6 3.2 L13.4 5 L12.6 3.4 L11.2 5.2 C8.6 6.8 6 9.6 4.9 11.6 C4.6 12.4 4.8 13.2 5.2 13.4 Z"/>
      <circle cx="9" cy="9" r=".6" fill="var(--ink)"/>
      <path d="M11 4.9 C11.5 2.5 14.1 1.5 16 2.5 C17.4 3.3 18 4.8 17.7 6.2 L11.3 5.6 Z" fill="var(--wash-pain)" stroke="var(--red-pen)" stroke-width="1.3"/>
      <path d="M11.3 5.3 L7.4 6.6" stroke="var(--red-pen)" stroke-width="1.3"/>
    </g>
  </svg>`;
}
// the Coach as a hand-drawn portrait, circular red-ring framed; degrades to the SVG face
// if the PNG is missing (onerror swaps in the procedural fallback in place).
const COACH_IMG = { hero:'coach-hero', listen:'coach-listen', question:'coach-question', cheer:'coach-cheer' };
function coachAvatar(size=28, expr='hero'){
  const file = COACH_IMG[expr] || COACH_IMG.hero;
  const fb = coachAvatarSvg(size).replace(/`/g,'').replace(/"/g,"'");
  return `<span class="coach-av" style="width:${size}px;height:${size}px;display:inline-flex;flex:none;border-radius:50%;overflow:hidden;border:1.5px solid var(--red-pen);background:var(--pop);vertical-align:middle">`+
    `<img src="/img/${file}.png" alt="" aria-hidden="true" width="${size}" height="${size}" `+
    `style="width:100%;height:100%;object-fit:cover;display:block" `+
    `onerror="this.parentNode.classList.add('av-fb');this.parentNode.style.border='none';this.parentNode.innerHTML=\`${fb}\`"></span>`;
}

// ---------- steeds (randomised player identity 🐎) ----------
const STEED_ADJ = ['Crimson','Midnight','Reckless','Galloping','Velvet','Thunder','Plucky','Dapper','Rowdy','Silver','Copper','Restless','Nimble','Bramble','Stormy','Sunny','Cheeky','Royal','Wandering','Brave','Lucky','Dusty','Wild','Mighty'];
const STEED_NOUN = ['Comet','Biscuit','Pip','Bolt','Dash','Hooves','Sergeant','Nutmeg','Maverick','Domino','Pepper','Clover','Banjo','Rascal','Sprocket','Tango','Pumpkin','Jubilee','Maple','Whisper','Marble','Pickles','Gizmo','Sundae'];
const STEED_COLORS = ['#7c3aed','#2e7d52','#2b3a55','#b8860b','#9a5b3b','#3b6b9a','#a23b6b','#3b8a8a'];
const rnd = a => a[Math.floor(Math.random()*a.length)];
function rollSteed(){ return { name: rnd(STEED_ADJ)+' '+rnd(STEED_NOUN), color: rnd(STEED_COLORS) }; }
// procedural steed head (offline / unmatched-colour fallback — never blank)
function steedSvgProc(color, size=22){ return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;flex:none"><path d="M5.2 13.4 L6.8 13 C8.2 12.7 9.4 13.2 10.2 14.3 C10.8 15.6 10.7 17.6 10.6 19.6 L18 19.6 C18.7 15.4 18.3 9.6 15.4 5.6 L14.6 3.2 L13.4 5 L12.6 3.4 L11.2 5.2 C8.6 6.8 6 9.6 4.9 11.6 C4.6 12.4 4.8 13.2 5.2 13.4 Z" fill="${color}22"/><path d="M14.5 7.5 C15.5 9.5 15.8 11.5 15.6 13.5"/><circle cx="9" cy="9" r=".6" fill="${color}"/></svg>`; }
// palette hex → hand-drawn steed-head illustration (STEED_COLORS order)
const STEED_IMG = {'#7c3aed':'steed-purple','#2e7d52':'steed-green','#2b3a55':'steed-navy','#b8860b':'steed-gold','#9a5b3b':'steed-chestnut','#3b6b9a':'steed-blue','#a23b6b':'steed-plum','#3b8a8a':'steed-teal'};
function steedImg(file, color, size){
  const fb = steedSvgProc(color, size).replace(/`/g,'').replace(/"/g,"'");
  return `<span class="steed-av" style="width:${size}px;height:${size}px;display:inline-flex;flex:none;vertical-align:middle">`+
    `<img src="/img/${file}.png" alt="" aria-hidden="true" width="${size}" height="${size}" `+
    `style="width:100%;height:100%;object-fit:contain;display:block" `+
    `onerror="this.parentNode.innerHTML=\`${fb}\`"></span>`;
}
function steedSvg(color, size=22){
  const file = STEED_IMG[String(color||'').toLowerCase()];
  // tiny chips (roster/dashboard/drill, ≤24px) stay crisp procedural SVG — the detailed
  // illustration is muddy at that size; ≥28px (paddock heads, race card, lobby) get the art.
  if(!file || size < 28) return steedSvgProc(color, size);
  return steedImg(file, color, size);
}
// faint dotted-line ghost steed for empty paddock slots; degrades to a pale procedural head
function steedGhost(size=22){ return steedImg('steed-ghost', '#8a93a8', size).replace('class="steed-av"','class="steed-av ghost-av"'); }
// a 4-frame trotting steed (the paddock waiting-loop). If frames are missing it shows
// frame 1 (or, failing that, the procedural navy head) — never blank, never broken.
function trotCycle(size=40){
  const fb = steedSvgProc('#21314f', size).replace(/`/g,'').replace(/"/g,"'");
  return `<span class="trotcycle" style="width:${size}px;height:${size}px;display:inline-block;position:relative" aria-hidden="true">`+
    [1,2,3,4].map(n=>`<img src="/img/trot-${n}.png" alt="" class="tf tf${n}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain"`+
      (n===1?` onerror="this.parentNode.innerHTML=\`${fb}\`"`:` onerror="this.remove()"`)+`>`).join('')+
    `</span>`;
}

// ---------- app state ----------
const LS = 'horsepower.v2';
let me = JSON.parse(localStorage.getItem(LS) || 'null') || { role:null, code:null, teamId:null, memberId:null, hostKey:null, name:'', steed:null, seatToken:null };
function saveMe(){ localStorage.setItem(LS, JSON.stringify(me)); }
function ensureSteed(){ if(!me.steed){ me.steed = rollSteed(); saveMe(); } return me.steed; }
let state = null;       // server public state
let ws = null;
let retryMs = 1200;     // reconnect backoff (reset on open; jittered so a room doesn't stampede)
let view = 'landing';
let revealShown = false;
let coachStatus = 'idle';
let coachBusy = false;
let ui = { drillTeamId:null, roomView:false, railWidth: 340, railOpen:null, seenChatLen:0, zoom:1, pan:{x:0,y:0}, challengeLock:null };
// Defer full re-renders while a canvas label is being edited, so a state broadcast
// (incl. the echo of our own edit) never clobbers the node the user is typing into.
let editingLock = false, pendingRender = false;
// EDITING-LOCK COVERAGE (broadcast-safety invariant — enforced by qa-editguard.js):
// every editable text field that lives inside the render() tree and commits LATE (on blur /
// button / Enter, not per-keystroke) must be listed here, so a teammate's broadcast can't
// destroy+recreate it mid-typing and wipe uncommitted text. Fields exempt from this list:
// per-keystroke draft-persisted (.coach-input via ui.coachDraft), document.body-appended
// modals (lock-challenge — outside the render tree), and non-text controls (range sliders).
document.addEventListener('focusin', e=>{ if(e.target.matches && e.target.matches('.node .label[contenteditable="true"], .inspector textarea, .inspector .sysin, .commitcard textarea, .pulsecard textarea, .baselinestrip input, .landperson textarea, .assumefloat textarea, .scratch textarea, .addorphan input, .whisperbox input, .timerctl input')) editingLock=true; });
document.addEventListener('focusout', e=>{ if(e.target.matches && e.target.matches('.node .label[contenteditable="true"], .inspector textarea, .inspector .sysin, .commitcard textarea, .pulsecard textarea, .baselinestrip input, .landperson textarea, .assumefloat textarea, .scratch textarea, .addorphan input, .whisperbox input, .timerctl input')){ editingLock=false; if(pendingRender){ pendingRender=false; setTimeout(render,0); } } });

function myTeam(){ return state && me.teamId ? state.teams.find(t=>t.id===me.teamId) : null; }

// ---------- websocket ----------
function connect(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => { retryMs = 1200; if (me.code) sendJoin(); };
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'state'){ state = m.state; afterState(); render(); }
    else if (m.type === 'joined'){ if(m.hostKey) me.hostKey=m.hostKey; if(m.teamId) me.teamId=m.teamId; if(m.memberId) me.memberId=m.memberId; saveMe(); state=m.state; afterState(); render(); }
    else if (m.type === 'seated'){ me.teamId=m.teamId; me.memberId=m.memberId; if(m.token) me.seatToken=m.token; saveMe(); if(state && state.state!=='lobby') ui.joinedMid=true; }
    else if (m.type && m.type.indexOf('voice:')===0){ if(window.VC) VC.onEvent(m); }   // Slice B Mode 2 realtime relay events
    else if (m.type === 'error'){ toast(m.error, true); }
  };
  ws.onclose = () => { retryMs = Math.min(retryMs * 1.7, 10000); setTimeout(connect, retryMs + Math.random() * 1500); };
}
function wsSend(obj){
  // A11: stamp the ids we last RECEIVED so the server can merge instead of wipe (peer adds survive)
  if (obj.type==='canvas:update'   && ui.known && ui.known.surface) obj.knownIds = ui.known.surface;

  const _af = document.activeElement;

function inkArrow(svg,x1,y1,x2,y2,seed,delay){
  const variants=[seed,seed+'x',seed+'y'].map(s=>{
    const d=roughLine(x1,y1,x2,y2,s,2.2);
    const ang=Math.atan2(y2-y1,x2-x1), L=10, a=.46;
    return d+`M${x2} ${y2} L${(x2-L*Math.cos(ang-a)).toFixed(1)} ${(y2-L*Math.sin(ang-a)).toFixed(1)} M${x2} ${y2} L${(x2-L*Math.cos(ang+a)).toFixed(1)} ${(y2-L*Math.sin(ang+a)).toFixed(1)}`;
  });

function tourSketch(){
  const W=560, H=200;

  const ink=document.createElementNS(ns,'svg');
  ink.setAttribute('class','posterink'); ink.setAttribute('viewBox',`0 0 ${W} ${H}`); ink.setAttribute('aria-hidden','true');
  box.append(ink);
  const path=svgPath(ink);
  const ITEMS=[
    {id:'tsp', cls:'persona', g:'g-persona', t:'Persona', x:32,  y:6,   d:150, cap:'Persona — who owns it'},
    {id:'tst', cls:'trigger', g:'g-trigger', t:'Trigger', x:0,   y:118, d:350, cap:'Trigger — what kicks it off'},
    {id:'tsf', cls:'phase',   g:null,        t:'Phase',   x:172, y:92,  d:550, w:132, h:54, cap:'Phases hold the moments that matter — flag the painful ones'},
    {id:'tsi', cls:'intent',  g:'g-bulb',    t:'Intent',  x:368, y:26,  d:750, cap:'Intent — the WHY: a decision, not a report'},
    {id:'tso', cls:'outcome', g:'g-flag',    t:'Outcome', x:402, y:142, d:950, cap:'Outcome — what changes in the world'}
  ];
  const cap=el('div',{class:'tourcap', 'aria-live':'polite'});
  let idx=0;
  const nodes=ITEMS.map((nd,i)=>{
    const n=sketchNode(box, nd, 'tour');
    n.addEventListener('click',()=>{ idx=i; setActive(); });
    return n;
  });
  sketchMoment(box, 222, 152, 'a moment that matters', 1150, 'tsm');
  inkArrow(ink,150,139,168,125,'tsa1',500);
  inkArrow(ink,308,112,364,52,'tsa2',700);
  inkArrow(ink,452,72,470,138,'tsa3',900);
  path(roughLine(116,50,232,98,'tsl1',2.4),'leash',1300);
  const setActive=()=>{ nodes.forEach((n,i)=>n.classList.toggle('on', i===idx)); cap.textContent=ITEMS[idx].cap; };
  setActive();
  tourTimer=setInterval(()=>{ idx=(idx+1)%ITEMS.length; setActive(); }, 2400);

  return wrap;
}

function paddockFence(members){

  draw();

  root._fit = (cw,ch,maxScale=1)=>{
    // the fit box covers blocks AND teardown overlay cards (~214×96) — otherwise the
    // candidate/concern band (world x≥680) is invisible to the fit and slides under the tray

}

function viewSurface(){

  // when the Coach is satisfied (done) OR the team chose "draw it myself". skip + done persist per-team.
  const skipped = ui.interviewSkip || (me.ivSkip && me.ivSkip[t.id]);

  if(!handedOff && !skipped) return interviewHero(t);

  // the reconciler applies incremental updates instead of rebuilding the whole map every state.
  const ckey='surface:'+t.id;
  let cv = canvasCache[ckey];
  if(cv) cv._update({ canvas:t.canvas, gov:t.governance, onChange:(c)=>{ wsSend({type:'canvas:update', canvas:c}); } });
  else { cv = makeCanvas({ canvas:t.canvas, editable:true, mode:'surface', gov:t.governance, testid:'surface-canvas',

  async function doSend(){

    const isDump = mode==='surface' && (text.length>110 || (text.match(/[.;\n]|, /g)||[]).length>=2);

      } else if(d.degraded) toast('Coach is offline — running on the built-in question bank. The map & checks still work.',true);
    }catch(e){ coachBusy=false; coachStatus='offline'; setStatus(); wsSend({type:'chat:post', role:'system', content:'Coach is offline — keep going, the map and checks all work without it.'}); }
  }
  function setStatus(){ const s=$('#coach-status'); if(s) s.textContent=coachStatusText(); }

}

function bubble(m){

function buildCoachContext(mode){
  const t=myTeam(); if(!t) return '';
  if(mode==='surface'){ const c=t.canvas; const g=t.governance;
    const bl=c.blocks||[];
    const noWhy=ty=>bl.filter(b=>b.type===ty&&!(b.meta&&b.meta.why)).map(b=>b.text||'(blank)');
    const noCap=bl.filter(b=>b.type==='persona'&&!(b.meta&&b.meta.capacity)).map(b=>b.text||'(blank)');
    const whyGaps=`WHY-GAPS: personas-missing-why=[${noWhy('persona').join('; ')}]; personas-missing-capacity=[${noCap.join('; ')}]; phases-missing-why=[${noWhy('phase').join('; ')}]; pains-without-why=[${bl.filter(b=>b.pain&&!(b.meta&&b.meta.why)).map(b=>b.text||'').join('; ')}]`;
    const sysList=bl.filter(b=>b.meta&&b.meta.system).map(b=>b.meta.system).join('; ')||'none named';   // R4a
    const baseline=(c.baseline&&(c.baseline.frequency||c.baseline.cycleTime))?`runs ${c.baseline.frequency||'?'} · takes ${c.baseline.cycleTime||'?'}`:'not captured';   // R4b
    return `CANVAS:\n${summarizeCanvas(c)}\n${whyGaps}\nSYSTEMS: ${sysList}\nTODAY: ${baseline}\nGOVERNANCE: missing=${(g.missing||[]).join(',')||'none'}; thin=${(g.thin||[]).length}; orphans=${g.orphans}; gate=${g.gate.ready?'ready':'not ready'}`; }
  if(mode==='rebuild'&&t.redesign){ const r=t.redesign;
    return `TEARDOWN: need(intent=${r.teardown.brief.need.intent}; trigger=${r.teardown.brief.need.trigger}); want(outcome=${r.teardown.brief.want.outcome}); areas=${(r.teardown.areasOfConcern||[]).map(a=>a.text).join('; ')}; candidates=${(r.teardown.candidateConstraints||[]).map(x=>x.text+'('+x.capacity+')').join('; ')}; people=${(r.teardown.people||[]).map(p=>p.role).join(', ')}\nNEW DESIGN:\n${summarizeCanvas(r.canvas)}\nPEOPLE LANDED: ${(r.peopleLandings||[]).filter(p=>p.outcome).length}/${(r.peopleLandings||[]).length}`; }
  return '';
}
function summarizeCanvas(c){
  const by={}; (c.blocks||[]).forEach(b=>{ (by[b.type]=by[b.type]||[]).push(b.text||'(blank)'); });
  return Object.keys(by).map(k=>`${k}: ${by[k].join(' | ')}`).join('\n')||'(empty)';
}

  if(!isPhone()){
    const key='rb'+(ui.railOpen!==false?'o':'c');
    if((ui.rbFit||{}).key!==key){ (ui.rbFit=ui.rbFit||{}).key=key;
      requestAnimationFrame(()=>{ const sc=cv.querySelector('.scene'); const rr=sc&&sc.getBoundingClientRect();
        if(rr&&rr.width>600){ cv._fit(rr.width-274, rr.height, 1); if(cv._view){ ui.zoom=cv._view().zoom; ui.pan=cv._view().pan; } } });
    }
  }
  left.append(cv);
  work.append(left);
  work.append(buildCoachRail('rebuild', (r.canvas.chat)||[]));
  return work;
}

  const tdn=r.teardown||{}; const ov=[]; let row=0;

// kept/MYTH judgment — single source for the share ledger, race card, and export.
// kept = survived as a locked block, OR structurally load-bearing capacity,
// OR vouched by a confirmed assumption; a busted assumption can demote a non-survivor.
function judgeLedger(rebuilder){
  const r=rebuilder&&rebuilder.redesign; if(!r) return [];
  const kept=new Set((r.canvas.blocks||[]).filter(b=>b.locked).map(b=>b.text));
  const asms=r.assumptions||[];
  const stop=new Set(['the','and','for','that','with','this','from','they','have','will','been','were','their','about']);
  const toks=x=>String(x||'').toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>=4&&!stop.has(w));
  const overlaps=(a,b)=>{ const A=new Set(toks(a)); return toks(b).some(w=>A.has(w)); };
  return (r.teardown.candidateConstraints||[]).map(c=>{
    const survived=kept.has(c.text);
    const structural=/^(accountable|served)$/i.test(String(c.capacity||'').trim());
    const confirmed=asms.some(a=>a.status==='confirmed'&&overlaps(a.text,c.text));
    const busted=asms.some(a=>a.status==='busted'&&overlaps(a.text,c.text));
    return { text:c.text, capacity:(c.capacity&&!/^unspecified$/i.test(c.capacity))?c.capacity:null, held: survived || structural || (confirmed && !busted) ? !(busted && !survived && !structural) : false };
  });
}

// C2: render the keepsake to PNG with a plain 2D canvas — no libraries
async function saveRaceCardPng(t, steed, intentTxt, becameTxt, kills, riders, venue){
  // B7: render the keepsake at ≥2× backing store (it gets screenshotted/printed — crispest artifact in the app)
  // and force the actual variable-font instances before drawing so the first cold save isn't Georgia.
  const W=880, H=520, s=Math.max(2, Math.round(window.devicePixelRatio||1));
  const cv=document.createElement('canvas'); cv.width=W*s; cv.height=H*s;
  const g=cv.getContext('2d'); g.scale(s,s);
  try{ await document.fonts.load('600 44px Fraunces'); await document.fonts.load('400 24px Inter'); await document.fonts.ready; }catch(e){}
  g.fillStyle='#fffaf0'; g.fillRect(0,0,W,H);
  g.strokeStyle='#21314f'; g.lineWidth=4; g.strokeRect(14,14,W-28,H-28);
  // steed-coloured rect (identity swatch)
  g.fillStyle=steed.color||'#7c3aed'; g.fillRect(48,52,64,64);
  g.fillStyle='#21314f';
  g.font='600 44px Fraunces, Georgia, serif'; g.fillText(t.name, 134, 100);
  g.font='400 22px Inter, sans-serif'; g.fillStyle='#66708a';
  if(riders) g.fillText('ridden by '+riders, 134, 134);
  const lines=[
    ['What it was:', intentTxt],
    ['What it became:', becameTxt],
  ];
  if(kills.myths>0 || kills.landedTotal>0){
    const bits=[]; if(kills.myths>0) bits.push(kills.myths+' myth'+(kills.myths===1?'':'s')+' struck'); if(kills.landedTotal>0) bits.push(kills.landedTotal+(kills.landedTotal===1?' person':' people')+' landed');
    lines.push(['Tally:', bits.join(' · ')]);
  }
  let y=210; lines.forEach(([k,v])=>{
    g.fillStyle='#b3760b'; g.font='600 20px Inter, sans-serif'; g.fillText(k, 48, y);
    g.fillStyle='#21314f'; g.font='400 24px Inter, sans-serif';
    // simple wrap
    const words=String(v).split(' '); let line=''; let yy=y+34;
    words.forEach(w=>{ const test=line+w+' '; if(g.measureText(test).width>W-96 && line){ g.fillText(line, 48, yy); line=w+' '; yy+=32; } else line=test; });
    g.fillText(line, 48, yy); y=yy+44;
  });
  g.fillStyle='#4A5468'; g.font='500 16px Inter, sans-serif'; g.fillText(venue.toUpperCase(), 48, H-44);
  const url=cv.toDataURL('image/png');
  const a=document.createElement('a'); a.href=url; a.download='horsepower-'+(t.name||'card').replace(/\s+/g,'-').toLowerCase()+'.png'; document.body.append(a); a.click(); a.remove();
  toast('Race card saved.');
}
// the presented/share minis are the projector's money shot — a team's free-form map may
// have overlapping blocks, but the PRESENTED copy never should. One cheap force-apart
// pass on the clone (the working canvas is untouched).
function nudgeApart(canvas){
  const bs=(canvas.blocks||[]).slice().sort((a,b)=>a.y-b.y||a.x-b.x);
  for(let pass=0; pass<3; pass++){
    for(let i=0;i<bs.length;i++) for(let j=i+1;j<bs.length;j++){
      const a=bs[i], b=bs[j];
      const ox=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x), oy=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
      if(ox>8 && oy>8){ if(ox<oy){ b.x+=(b.x+b.w/2>=a.x+a.w/2? ox+10 : -(ox+10)); } else { b.y+=(b.y+b.h/2>=a.y+a.h/2? oy+10 : -(oy+10)); } }
    }
  }
  return canvas;
}
function renderMini(container, canvas, mode, maxScale){
  const mini=makeCanvas({canvas:nudgeApart(JSON.parse(JSON.stringify(canvas))), editable:false, readOnly:true, mode, compact:true});
  mini.style.position='absolute'; mini.style.inset='0';            // fill the container
  const sc=mini.querySelector('.scene'); sc.style.position='absolute'; sc.style.inset='0';

  container.innerHTML=''; container.append(mini);
  const fit=()=>mini._fit(container.clientWidth||320, container.clientHeight||240, maxScale||1);
  setTimeout(fit,20); setTimeout(fit,150);                          // refit once layout settles
}

function canvasToSvg(canvas){
  const blocks=canvas.blocks||[]; if(!blocks.length) return '<p>(empty)</p>';
  const minX=Math.min(...blocks.map(b=>b.x))-20,minY=Math.min(...blocks.map(b=>b.y))-20,maxX=Math.max(...blocks.map(b=>b.x+b.w))+20,maxY=Math.max(...blocks.map(b=>b.y+b.h))+20;
  const W=maxX-minX,H=maxY-minY;
  const cols={persona:'#efe7fb',trigger:'#dcebe0',input:'#e8e6e0',phase:'#efe7d6',moment:'#e3ebfb',intent:'#efe7d6',outcome:'#ffe9a8',agent:'#dbe4f5',text:'transparent',pain:'#fbe3e3'};
  let s=`<svg viewBox="${minX} ${minY} ${W} ${H}" width="${Math.min(700,W)}">`;
  (canvas.arrows||[]).forEach(a=>{const f=blocks.find(b=>b.id===a.from),t=blocks.find(b=>b.id===a.to);if(f&&t)s+=`<line x1="${f.x+f.w/2}" y1="${f.y+f.h/2}" x2="${t.x+t.w/2}" y2="${t.y+t.h/2}" stroke="#9aa3b8" stroke-width="2"/>`;});
  blocks.forEach(b=>{const fill=cols[b.pain?'pain':b.type]||'#fff';
    // B11: two-line wrap (split near char 26), ellipsize past ~52 — long names survive the leave-behind
    const txt=(b.text||''); let l1=txt, l2='';
    if(txt.length>26){ const cut=txt.lastIndexOf(' ',26); l1=txt.slice(0, cut>10?cut:26); l2=txt.slice(l1.length).trim(); if(l2.length>26) l2=l2.slice(0,25)+'…'; }
    s+=`<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="10" fill="${fill}" stroke="${b.locked?'#7c3aed':'#21314f'}" stroke-width="1.5" ${b.locked?'stroke-dasharray="5 4"':''}/><text x="${b.x+b.w/2}" y="${b.y+b.h/2+(l2?-2:4)}" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#21314f">${esc(l1)}${l2?`<tspan x="${b.x+b.w/2}" dy="13">${esc(l2)}</tspan>`:''}</text>`;});
  return s+'</svg>';
}

function myMember(){ const t=myTeam(); return t&&(t.members||[]).find(m=>m.id===me.memberId)||null; }

// R1a — the commitment beat: one self-serve, idempotent, debounced field (share+closed, NO phase/gate).
function commitmentCard(){
  const mm=myMember(); if(!mm) return el('span',{});
  const box=el('div',{class:'commitcard card', 'data-testid':'commit-card'});
  box.append(el('h3',{html: glyph('g-flag')+' Your one commitment'}));
  box.append(el('p',{class:'meta'},'What’s the first thing you’ll redesign — not retrofit — back at your desk? (What → So-What → Now-What: this is your Now-What.)'));
  const ta=el('textarea',{'data-testid':'commit-input', 'aria-label':'Your one commitment', maxlength:'400', placeholder:'e.g. “Stop the Friday approval email — let the system act and ping me only on exceptions.”'});
  ta.value=(mm.commitment&&mm.commitment.text)||'';
  const save=()=>{ const v=ta.value.trim().slice(0,400); if(((mm.commitment&&mm.commitment.text)||'')!==v){ wsSend({type:'commitment:submit', text:v}); if(v && !ui.commitToasted){ ui.commitToasted=true; toast('Commitment saved — it rides in your recap.'); } } };
  ta.addEventListener('blur',save);

  box.append(ta);

  return box;
}

// R2 — the 60-second exit pulse: two short textareas + two before/after confidence sliders, idempotent + debounced.
function pulseCard(){
  const mm=myMember(); if(!mm) return el('span',{});
  const p=mm.pulse||{};
  const box=el('div',{class:'pulsecard card', 'data-testid':'pulse-card'});
  box.append(el('h3',{html: glyph('g-bulb')+' 60-second pulse'}));
  box.append(el('p',{class:'meta'},'No scores, no comparisons — just your read on the day.'));
  const aha=el('textarea',{'data-testid':'pulse-aha', 'aria-label':'One aha you had today', maxlength:'400', placeholder:'One aha you had…'}); aha.value=p.aha||'';
  const diff=el('textarea',{'data-testid':'pulse-diff', 'aria-label':'One thing you’ll do differently', maxlength:'400', placeholder:'One thing you’ll do differently…'}); diff.value=p.didDiff||'';
  const mkSlider=(lbl,val,tid)=>{ const w=el('label',{class:'pulseslider'}); w.append(el('span',{class:'pslabel'},lbl));
    const r=el('input',{type:'range', min:'0', max:'10', step:'1', value:(typeof val==='number'?val:5), 'data-testid':tid, 'aria-label':lbl}); const out=el('span',{class:'sliderval', 'aria-hidden':'true'}, String(typeof val==='number'?val:5));
    r.addEventListener('input',()=>{ out.textContent=r.value; r.setAttribute('aria-valuetext', r.value+' out of 10'); commit(); }); w.append(r,out); w._input=r; return w; };
  const before=mkSlider('Before today, I could redesign a workflow AI-native', p.confBefore, 'pulse-before');
  const after =mkSlider('After today, I could redesign a workflow AI-native',  p.confAfter,  'pulse-after');
  let pt; function commit(){ clearTimeout(pt); pt=setTimeout(()=>{
    wsSend({type:'pulse:submit', aha:aha.value.trim(), didDiff:diff.value.trim(),
            confBefore:Number(before._input.value), confAfter:Number(after._input.value)});
    if(!ui.pulseToasted){ ui.pulseToasted=true; toast('Pulse logged — thank you.'); }
  },700); }
  [aha,diff].forEach(t=>{ t.addEventListener('blur',()=>{clearTimeout(pt); commit();}); t.addEventListener('input',commit); t.addEventListener('keydown',e=>e.stopPropagation()); });
  box.append(aha, diff, before, after);
  return box;
}

// R1b — the travelling recap. Pure rule-based assembly from wire state (the always-correct floor);
// the AI intro is optional enrichment, fetched best-effort and inlined client-side before download.
function recapFacts(t){
  const rebuilder=(state.teams||[]).find(x=>x.receivedFromTeamId===t.id);   // who rebuilt OUR workflow
  const orig=t.receivedFromTeamId ? (state.teams||[]).find(x=>x.id===t.receivedFromTeamId) : null; // whose we rebuilt
  const ledger=judgeLedger(rebuilder);
  const myths=ledger.filter(c=>!c.held);
  const bl=(t.canvas&&t.canvas.baseline)||null;   // BATCH-1 read — guarded
  const commitments=(t.members||[]).map(m=>m.commitment&&m.commitment.text).filter(Boolean);
  const pulses=(t.members||[]).map(m=>m.pulse).filter(Boolean);
  return { t, rebuilder, orig, ledger, myths, bl, commitments, pulses,
           intent: intentOf(t.canvas)||'their real process',
           became: rebuilder&&rebuilder.redesign ? becameLine(rebuilder) : 'no rebuild captured' };
}

function _downloadRecap(t, html){
  try{
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download='horsepower-recap-'+(t.name||'session').replace(/\s+/g,'-').toLowerCase()+'.html';
    document.body.append(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    toast('Recap saved — it’s yours to keep, email, or send your boss.');
  }catch(e){
    const win=window.open('','_blank');           // tertiary fallback
    if(win){ win.document.write(html); win.document.close(); toast('Recap opened — press ⌘/Ctrl-S to save it.'); }
    else toast('Allow pop-ups (or downloads) to save your recap.', true);
  }
}
// flush any just-typed commitment/pulse into local state BEFORE building the recap — the
// in-card commit is debounced (900ms) + round-trips through the server, so saving the recap
// within ~1s of typing would otherwise read stale state (empty commitment). Optimistic local
// set bridges the round-trip; the wsSend confirms it server-side.
function flushTakeaways(){
  const mm=myMember(); if(!mm) return;
  const ci=document.querySelector('[data-testid=commit-input]');
  if(ci){ const v=ci.value.trim().slice(0,400); if(((mm.commitment&&mm.commitment.text)||'')!==v){ mm.commitment={text:v, ts:Date.now()}; wsSend({type:'commitment:submit', text:v}); } }
  const pc=document.querySelector('[data-testid=pulse-card]');
  if(pc){ const aha=pc.querySelector('[data-testid=pulse-aha]'), diff=pc.querySelector('[data-testid=pulse-diff]'), rs=pc.querySelectorAll('input[type=range]');
    if(aha&&diff&&rs.length>=2){ const p={aha:aha.value.trim().slice(0,400), didDiff:diff.value.trim().slice(0,400), confBefore:Number(rs[0].value), confAfter:Number(rs[1].value), ts:Date.now()};
      mm.pulse=p; wsSend({type:'pulse:submit', aha:p.aha, didDiff:p.didDiff, confBefore:p.confBefore, confAfter:p.confAfter}); } }
}
async function saveRecap(t){
  flushTakeaways();
  // optional AI intro — best-effort, never blocks the rule-assembled artifact (degrades to silence)
  let intro='';
  try{
    const f=recapFacts(t);
    const ctx=['Team: '+t.name, 'What it was: '+f.intent, 'What it became: '+f.became,
      'Myths struck: '+(f.myths.length?f.myths.map(m=>m.text).join('; '):'none')].join('\n');
    const ac=new AbortController(); const to=setTimeout(()=>ac.abort(), 6000);
    const r=await fetch('/api/coach',{method:'POST',headers:{'Content-Type':'application/json'},signal:ac.signal,
      body:JSON.stringify({mode:'share', recap:true, code:state.code, context:ctx,
        messages:[{role:'user',content:'Write the warm recap intro from the supplied facts.'}]})});
    clearTimeout(to);
    const j=await r.json();
    if(j && !j.degraded && j.reply) intro=j.reply;   // only inline a genuine, non-degraded reply
  }catch(e){ /* degrade to silence — the recap is fully assembled below regardless */ }
  _downloadRecap(t, buildRecapHTML(t, intro));
}

  if(all.length){
    const cb=all.map(p=>p.confBefore).filter(n=>typeof n==='number'), ca=all.map(p=>p.confAfter).filter(n=>typeof n==='number');
    const avg=a=>a.length?(a.reduce((x,y)=>x+y,0)/a.length):null;
    const ab=avg(cb), aa=avg(ca);
    const shift=(ab!=null&&aa!=null)?((aa-ab>=0?'+':'')+(aa-ab).toFixed(1)):'—';
    box.append(el('div',{class:'meta'}, 'Confidence “I could redesign a workflow AI-native”: '+(ab==null?'—':ab.toFixed(1))+' → '+(aa==null?'—':aa.toFixed(1))+' / 10 (avg shift '+shift+')'));

  return box;
}

  ov.append(el('div',{class:'rotsub'},'every stable hands its work on'));      // Caveat aside
  const ring=el('div',{class:'swapring'});

    delete seenBlocks['rebuild-canvas'];
    render();

function primaryCTA(){
  const teams=state.teams||[];
  switch(state.state){
    case 'lobby':   return { label:'Start Surface', next:'surface', disabled: teams.length<1, reason:'waiting for a team to join' };
    case 'surface': return { label: state.hold?'Reveal the swap':'Swap → Rebuild', html: state.hold? glyph('g-stamp','ctaglyph')+'<span>Reveal the swap</span>' : null, held: !!state.hold, next:'rebuild', disabled: teams.length<2, reason:'need 2+ teams to swap' };

async function doAdvance(cta){

async function stepBack(){

// "needs you" triage — who to visit and why, derived from broadcast state
function needsYou(teams){
  const items=[];
  const t0=state.timer||{}; const dur=t0.durationMs||0; const rem=timerSecs()*1000;
  const lateThird = dur>0 && (timerExpired() || rem < dur/3);
  const pastHalf  = dur>0 && (timerExpired() || rem < dur/2);
  teams.forEach(t=>{
    const g=t.governance||{thin:[],orphans:0,missing:[],gate:{ready:false}};
    if((t.amendmentRequests||[]).some(r=>r.status==='pending')) items.push({t, sev:'high', why:'lock-amendment request waiting on your call'});
    if(state.state==='surface' && !g.gate.ready && lateThird) items.push({t, sev:'high', why:'still not redesign-ready with time short — go unblock them'});
    else if(state.state==='surface' && g.orphans>0 && pastHalf) items.push({t, sev:'med', why:g.orphans+' parked item'+(g.orphans===1?'':'s')+' — chase them onto the map'});
    if(state.state==='rebuild' && t.redesign){
      const unl=(t.redesign.peopleLandings||[]).filter(p=>!p.outcome).length;
      const agents=(t.redesign.canvas.blocks||[]).filter(b=>b.type==='agent').length;
      if(unl>0 && lateThird) items.push({t, sev:'high', why:unl+(unl===1?' person':' people')+' still unlanded — their export will be partial'});
      else if(!agents && pastHalf) items.push({t, sev:'med', why:'no Agent blocks yet — they may be retrofitting, not redesigning'});
    }
  });
  items.sort((a,b)=> (a.sev==='high'?0:1)-(b.sev==='high'?0:1) || a.t.name.localeCompare(b.t.name));
  return items;
}

      if(next) ctl.append(el('button',{class:'btn sm primary', onclick:()=>wsSend({type:'present:set',teamId:next.id})},'Next pair ›'));
      now.append(ctl);
      box.append(now);
    }
    const pr=el('div',{class:'row', style:'flex-wrap:wrap; margin-top:8px'});
    // R10: drop the whole room to the gallery wall (present:set teamId:null — already server-supported).
    pr.append(el('button',{class:'btn sm'+(!state.presentingPairId?' primary':''), 'data-testid':'present-gallery', title:'Show every pair on the wall at once — every team already has its own fate on their screen', html: glyph('g-flag')+' Gallery (show all)', onclick:()=>{wsSend({type:'present:set',teamId:null});}}));
    teams.filter(t=>t.receivedFromTeamId).forEach(t=>{ const orig=teams.find(x=>x.id===t.receivedFromTeamId);
      const done=ui.presented[t.id] && state.presentingPairId!==t.id;
      pr.append(el('button',{class:'btn sm'+(state.presentingPairId===t.id?' primary':'')+(done?' wasshown':''), 'data-testid':'present-pick', onclick:()=>{wsSend({type:'present:set',teamId:t.id});}}, (done?'✓ ':'')+(orig?orig.name:'?')+' → '+t.name)); });
    box.append(pr); dash.append(box);
  }
  con.append(dash);
  return con;
}
function stat(n,l,g){ const s=el('div',{class:'stat', style:'--rot:'+seededRot('st'+l,0.7)+'deg'}); if(g) s.append(el('span',{class:'stat-g', html:glyph(g)})); s.append(el('div',{class:'n'}, String(n)), el('div',{class:'l'}, l)); return s; }
function whisper(t){
  const g=t.governance; if(!g) return '';
  if(state.state==='surface'){ if(g.gate.ready) return 'redesign-ready ✓'; if(g.orphans) return g.orphans+' orphan(s) to chase'; if((g.missing||[]).length) return 'missing '+g.missing.slice(0,2).join(', '); if((g.thin||[]).length) return 'thin in '+g.thin.length+' spots'; return 'getting going'; }
  if(state.state==='rebuild'&&t.redesign){ const unl=(t.redesign.peopleLandings||[]).filter(p=>!p.outcome).length; const agents=(t.redesign.canvas.blocks||[]).filter(b=>b.type==='agent').length; if(unl) return unl+(unl===1?' person':' people')+' unlanded'; if(!agents) return 'no agent blocks yet — still retrofitting?'; return agents+(agents===1?' agent':' agents')+' · people landing'; }
  return '';
}
// R7: the Farrier's private compose box (the console is NEVER projected). Client-side vocab
// lint warns early; the server re-checks (rule #4 — lint client AND server).
function whisperBox(t){
  const box=el('div',{class:'whisperbox card', style:'margin-top:12px'});
  box.append(el('h3',{html: glyph('g-flag')+' Whisper to '+esc(t.name)}));
  const inp=el('input',{placeholder:'one line to their Coach rail — e.g. “your trigger is still empty, 5 min left”', maxlength:'240','data-testid':'whisper-input'});
  const warn=el('div',{class:'meta', style:'color:var(--pain); min-height:16px'});
  const BANNED=/\b(swap(s|ping|ped)?|re[\s-]?design(s|ing|ed)?|re[\s-]?build(s|ing)?|rebuilt|hand[\s-]?s?[\s-]?over(s|ing)?|hand[\s-]?off(s)?|receiving[\s-]?team|stranger(s)?|transfer(s|ring|red)?)\b/i;
  const send=()=>{ const v=inp.value.trim(); if(!v) return;
    if(BANNED.test(v)){ warn.textContent='That names the surprise — rephrase before it reaches the team.'; return; }
    wsSend({type:'farrier:whisper', teamId:t.id, text:v}); inp.value=''; warn.textContent=''; toast('Whisper sent to '+t.name); };
  inp.addEventListener('input',()=>{ warn.textContent = BANNED.test(inp.value)?'Heads-up: that word names the surprise — it’ll be blocked.':''; });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } });
  box.append(inp, el('button',{class:'btn sm primary','data-testid':'whisper-send', onclick:send}, 'Whisper'), warn);
  return box;
}
function drillDown(){
  const t=state.teams.find(x=>x.id===ui.drillTeamId);
  const wrap=el('div',{class:'drill'});
  const head=el('div',{class:'spread', style:'padding:12px 0'});
  head.append(el('h2',{class:'tn-ell', style:'max-width:70vw', title:t.name}, t.name+' — live board'));
  const ctrls=el('div',{class:'row'});
  ctrls.append(el('button',{class:'btn sm ghost', onclick:()=>{ui.drillTeamId=null;render();}},'← all teams'));
  if(state.state==='surface'&&t.hasTeardown){ ctrls.append(el('button',{class:'btn sm', 'data-testid':'brief-preview', onclick:()=>showBriefPreview(t)},'Preview brief (leak QA)')); ctrls.append(el('button',{class:'btn sm subtle', onclick:()=>wsSend({type:'teardown:regenerate',teamId:t.id})},'Regenerate')); }
  ctrls.append(el('button',{class:'btn sm danger', onclick:async()=>{ if(state.state!=='lobby'&&state.state!=='surface'){ toast('Roster locked after the swap.',true); return; } if(await confirmModal('Their map and members go with them.', {title:'Remove '+t.name+'?', confirmText:'Remove', danger:true})){ wsSend({type:'team:remove',teamId:t.id}); ui.drillTeamId=null; } }},'Remove'));
  head.append(ctrls);
  wrap.append(head);
  const mirror=el('div',{class:'mirror'});
  mirror.append(el('div',{class:'ro'},'read-only mirror'));
  const canvas = (state.state==='rebuild'||state.state==='share')&&t.redesign ? t.redesign.canvas : t.canvas;
  setTimeout(()=>{ const m=el('div',{style:'position:absolute;inset:0'}); mirror.append(m); renderMini(m, canvas, state.state==='rebuild'?'rebuild':'surface'); },0);
  // roster surgery (pre-swap) sits ABOVE the mirror — it was below the fold at 1440x900
  if(state.state==='lobby'||state.state==='surface'){
    const ros=el('div',{class:'card', style:'margin-top:14px'});
    ros.append(el('h3',{},'Roster'));
    (t.members||[]).forEach(m=>{
      const row=el('div',{class:'row', style:'margin-top:7px; gap:8px'});
      row.append(el('span',{html:steedSvg((m.steed&&m.steed.color)||'#7c3aed',20)}));
      row.append(el('span',{}, esc((m.steed&&m.steed.name)||m.name||'?')+(m.name?' · '+esc(m.name):'')+(m.online?'':' · offline')));
      const others=state.teams.filter(x=>x.id!==t.id);
      if(others.length){
        const sel=el('select',{style:'width:auto; font-size:12px; padding:4px 6px', onchange:e=>{ if(e.target.value){ wsSend({type:'member:reseat', memberId:m.id, teamId:e.target.value}); } }});
        sel.append(el('option',{value:''},'move to…'));
        others.forEach(o=>sel.append(el('option',{value:o.id}, o.name)));
        row.append(sel);
      }
      row.append(el('button',{class:'btn sm subtle', title:'remove this member (ghost/duplicate)', onclick:async()=>{
        if(await confirmModal('Removes just this person from '+t.name+'. Use for a duplicate or a ghost join.', {title:'Remove '+((m.steed&&m.steed.name)||m.name)+'?', confirmText:'Remove', danger:true}))
          wsSend({type:'member:remove', memberId:m.id});
      }},'✕'));
      ros.append(row);
    });
    wrap.append(ros);
  }
  wrap.append(mirror);
  if(state.state==='surface'||state.state==='rebuild') wrap.append(whisperBox(t));   // R7: whisper to this team's Coach rail
  const chat=((state.state==='rebuild'&&t.redesign?t.redesign.canvas.chat:t.canvas.chat)||[]);
  if(chat.length){ const cbox=el('div',{class:'card', style:'margin-top:14px; max-height:200px; overflow:auto'}); cbox.append(el('h3',{},'Their Coach conversation (live)')); chat.slice(-8).forEach(m=>cbox.append(el('div',{class:'meta', style:'margin-top:4px'}, (m.name||m.role)+': '+esc(m.content)))); wrap.append(cbox); }
  return wrap;
}
function showBriefPreview(t){
  const td=t.teardown; if(!td){toast('No teardown yet.',true);return;}
  const win=window.open('','_blank','width=520,height=700'); if(!win){toast('Allow pop-ups.',true);return;}
  win.document.write(`<body style="font-family:Inter,sans-serif;padding:20px;color:#21314f;background:#f4efe2">
   <h2>Brief preview — ${esc(t.name)} <small style="color:#e23b3b">(leak QA — never shown to teams)</small></h2>
   <p><b>Need:</b> ${esc(td.brief.need.intent)} (trigger: ${esc(td.brief.need.trigger)})</p>
   <p><b>Want:</b> ${esc(td.brief.want.outcome)}</p>
   <p><b>Areas of concern:</b></p><ul>${(td.areasOfConcern||[]).map(a=>`<li>${esc(a.text)}</li>`).join('')}</ul>
   <p><b>Candidate constraints:</b></p><ul>${(td.candidateConstraints||[]).map(c=>`<li>${esc(c.text)} — ${esc(c.capacity)}</li>`).join('')}</ul>
   <p><b>People inventory:</b></p><ul>${(td.people||[]).map(p=>`<li>${esc(p.role)} — ${esc(p.capacity)}</li>`).join('')}</ul>
   <p style="color:#e23b3b">Scan for any leaked STEP name. If found → Regenerate.</p></body>`);
  win.document.close();
}

//==================================================================
// ROOM VIEW
//==================================================================
function viewRoom(){
  const rv=el('div',{class:'roomview'});
  const presenting = state.state==='share' && state.presentingPairId;
  const working = (state.state==='surface'||state.state==='rebuild');
  // a small always-visible code chip (top-right) for late joiners when the timer/before-after owns the stage
  const cornerChip = ()=> el('div',{class:'codecorner', title:'join code'}, state.code);

  // 2-step reveal — the projected HOLD beat ("pens down") before the rotation fires
  if(state.hold){
    rv.classList.add('hold');
    rv.append(el('div',{class:'holdcoach', html: coachAvatar(140,'listen')}));   // framed portrait clips the baked bg; 'listen' = ears-up, pre-reveal
    rv.append(el('div',{class:'holdkick'},'one moment…'));
    rv.append(el('div',{class:'holdbig'},'Pens down'));
    rv.append(el('div',{class:'holdsub'},'Eyes up front — something’s about to change.'));
    return rv;
  }

  if(working){
    // option C — the WAR-ROOM: a throne clock that's ALWAYS on the wall + every team's LIVE map,
    // heavily blurred (energy, not content). The code lives ambient top-right, never as a clock fallback.
    rv.classList.add('warroom');
    const t0 = state.timer || {};
    const armed = t0.durationMs>0 && !timerStarted();                 // loaded, not yet started
    const clockTxt = timerExpired() ? 'TIME' : ((timerStarted()||armed) ? fmtTimer() : '—:—');
    const clockCls = 'bigtimer throne war'+(timerLow()&&timerStarted()?' low':'')+(timerExpired()?' elapsed':'')+(armed?' armed':'')+(!timerStarted()&&!armed?' empty':'');
    const head=el('div',{class:'warhead'});
    head.append(el('div',{class:clockCls, id:'bigtimer'}, clockTxt));
    const capwrap=el('div',{class:'warcap'});
    capwrap.append(el('div',{class:'phasecap'}, state.state==='surface'?'Surface — mapping how it works today':'Rebuild — making it AI-native'));
    const sub = timerExpired()?'time’s up — wrap it' : (timerStarted()? (t0.running?'on the clock':'paused') : (armed?('loaded · '+Math.round(t0.durationMs/60000)+' min — start when ready'):'no clock set'));
    capwrap.append(el('div',{class:'warsub'}, sub));
    head.append(capwrap);
    rv.append(head);
    rv.append(el('div',{class:'warcode', title:'join code'}, state.code));
    const grid=el('div',{class:'wargrid'});
    (state.teams||[]).forEach(t=>{
      const green = state.state==='surface' && t.gateGreen;
      const cell=el('div',{class:'wcell'+(green?' green':'')});
      cell.style.setProperty('--rot', ((srand('wt'+t.id)()*1.4)-0.7).toFixed(2)+'deg');   // seeded, deterministic per team
      const nm=el('div',{class:'wname'}, t.name);
      if(green) nm.append(el('span',{class:'wgate', title:'newcomer-ready', html: glyph('g-flag','wgateg')}));
      const st=el('span',{class:'wsteeds'}); (t.members||[]).slice(0,6).forEach(m=>st.append(el('span',{html:steedSvg((m.steed&&m.steed.color)||'#7c3aed',22)}))); nm.append(st);
      cell.append(nm);
      const wrap=el('div',{class:'wmapwrap'}); const map=el('div',{class:'wmap'}); wrap.append(map); cell.append(wrap);
      const canvas = state.state==='surface' ? t.canvas : (t.redesign && t.redesign.canvas);
      if(canvas) setTimeout(()=>renderMini(map, canvas, state.state, 1.7),0);
      const prog=el('div',{class:'wprog'});
      if(state.state==='surface'){ const n=(t.canvas&&t.canvas.blocks||[]).length; prog.append(el('span',{class:'wpn'}, n+' block'+(n===1?'':'s'))); prog.append(el('span',{class:'wpq'+(green?' gg':'')}, green?'✓ newcomer-ready':'mapping…')); }
      else { const rb=((t.redesign&&t.redesign.canvas&&t.redesign.canvas.blocks)||[]); const ag=rb.filter(b=>b.type==='agent').length; const pl=((t.redesign&&t.redesign.peopleLandings)||[]); const landed=pl.filter(p=>p.outcome).length; const done=pl.length&&landed===pl.length; prog.append(el('span',{class:'wpn'}, rb.length+' blocks · '+ag+' agent'+(ag===1?'':'s'))); prog.append(el('span',{class:'wpq'+(done?' gg':'')}, landed+'/'+pl.length+' landed')); }
      cell.append(prog);
      grid.append(cell);
    });
    if(!(state.teams||[]).length) grid.append(el('div',{class:'warempty'}, el('div',{class:'warsub'},'waiting for stables to assemble…')));
    rv.append(grid);
    return rv;
  }
  if(presenting){
    // the double reveal owns the stage: ink backdrop, room-scale cards, minis allowed to scale UP
    rv.classList.add('staged');
    rv.append(cornerChip());
    const t=state.teams.find(x=>x.id===state.presentingPairId); const orig=state.teams.find(x=>x.id===t.receivedFromTeamId);
    const ba=el('div',{class:'present-ba'});
    const bc=el('div',{class:'ba-card ghosted'}); bc.append(el('div',{class:'ttl'},'What it was — '+(orig?orig.name:''))); const bm=el('div',{class:'ba-mini'}); bc.append(bm); if(orig) setTimeout(()=>renderMini(bm,orig.canvas,'surface',2.4),0);
    // a hand-drawn highlighter arrow carries the eye: was → became
    const arr=document.createElementNS('http://www.w3.org/2000/svg','svg');
    arr.setAttribute('class','present-arrow'); arr.setAttribute('viewBox','0 0 84 46'); arr.setAttribute('aria-hidden','true');
    inkArrow(arr, 4, 32, 76, 16, 'present-arrow', 200);
    const ac=el('div',{class:'ba-card bright'}); ac.append(el('div',{class:'ttl'}, el('span',{class:'hl'},'What it became — '+t.name))); const am=el('div',{class:'ba-mini'}); ac.append(am); if(t.redesign) setTimeout(()=>renderMini(am,t.redesign.canvas,'rebuild',2.4),0);
    ba.append(bc,arr,ac); rv.append(ba);
    if(timerStarted()) rv.append(el('div',{class:'bigtimer'+(timerLow()?' low':''), id:'bigtimer'}, timerText()));
    return rv;
  }
  // R10 gallery wall: share with no featured pair → the whole room's before→after at once
  // (the "everyone's fate is visible" beat). Featured branch above is untouched (e2e .ba-card===2 holds).
  if(state.state==='share' && !state.presentingPairId){
    rv.classList.add('gallery');
    rv.append(el('div',{class:'galleryhead'}, el('span',{}, 'The whole room — before → after')));
    const grid=el('div',{class:'gallery-grid'});
    (state.teams||[]).filter(t=>t.receivedFromTeamId).forEach(t=>{
      const orig=(state.teams||[]).find(x=>x.id===t.receivedFromTeamId);
      const cell=el('div',{class:'gcell'});
      cell.append(el('div',{class:'gnames'}, (orig?orig.name:'?')+' → '+t.name));
      const pair=el('div',{class:'gpair'});
      const bm=el('div',{class:'g-mini'}); const am=el('div',{class:'g-mini bright'});
      pair.append(bm, el('span',{class:'garrow', html: glyph('g-flag')}), am); cell.append(pair); grid.append(cell);
      if(orig) setTimeout(()=>renderMini(bm, orig.canvas, 'surface', 1.4),0);
      if(t.redesign) setTimeout(()=>renderMini(am, t.redesign.canvas, 'rebuild', 1.4),0);
    });
    rv.append(grid);
    rv.append(el('div',{class:'codecorner', title:'join code'}, state.code));
    return rv;
  }
  // lobby (or surface/rebuild with no timer running): code on the throne
  rv.append(el('div',{class:'joinline'}, 'join at ', el('b',{}, JOIN_HOST), ' · code below'));
  rv.append(el('div',{class:'code'}, state.code)); // static typographic poster (§17) — no idle motion
  const roster=el('div',{class:'roster'});
  (state.teams||[]).forEach((t,i)=>{ const rt=el('div',{class:'rteam anim-rise', style:'animation-delay:'+(i*80)+'ms'}, t.name); const av=el('div',{style:'display:flex; justify-content:center; align-items:center; gap:1px; margin:6px 0 2px'}); (t.members||[]).slice(0,8).forEach(m=>av.append(el('span',{html:steedSvg((m.steed&&m.steed.color)||'#7c3aed',22)}))); if((t.members||[]).length>8) av.append(el('span',{class:'plusn'}, '+'+(t.members.length-8))); rt.append(av, el('div',{class:'c'}, t.members.length+' aboard')); roster.append(rt); });
  if(!(state.teams||[]).length) roster.append(el('div',{class:'meta'},'waiting for stables to assemble…'));
  rv.append(roster);
  if(state.state==='surface') rv.append(el('div',{class:'meta', style:'font-size:20px'}, 'saddling up…'));
  if(timerStarted()) rv.append(el('div',{class:'bigtimer'+(timerLow()?' low':''), id:'bigtimer'}, timerText()));
  return rv;
}

//==================================================================
// boot
//==================================================================
if (me.code){ connect(); }
render();

// B10: service worker — secure-context only (https or localhost). Guarded so http-LAN throws nothing
// (the console-error log stays clean). The SW is a hosted/installable nicety; the self-hosted fonts
// are the actual venue-LAN resilience fix.
if ('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost'))
  navigator.serviceWorker.register('/sw.js').catch(()=>{});

// B12: Web Locks soft single-tab guard — MEMBERS only (the Farrier legitimately runs console + room view).
// Non-blocking: the first tab holds the lock; a later tab gets a warn toast (announced via B1). Secure-context
// gated like the SW; suites use isolated contexts (fresh memberId) so they never collide.
if (navigator.locks && me.memberId) navigator.locks.request('hp-'+me.memberId, {ifAvailable:true}, lock =>
  lock ? new Promise(()=>{}) : (toast('Horsepower is open in another tab — this tab may fight it for your seat.', true), null));
